// ── Fonctions locales à l'onglet ──────────────────────────────────────
async function testerConnexion(){
  setSupaStatus('loading');
  const res=await window.db.ping();
  setSupaStatus(res==='ok'?'ok':res==='not_configured'?'not_configured':'error');
  if(res==='ok') alert("✓ Connexion Supabase opérationnelle !");
  else if(res==='not_configured') alert("⚠ Clé API non configurée.");
  else alert("✗ Erreur de connexion : "+res+"\nVérifiez votre clé et l'URL du projet.");
}
async function sauvegarderConfig(){
  const newKey=supaKeyInput.trim();
  if(newKey){
    localStorage.setItem('eureka_supa_key',newKey);
    window._supaKey=newKey;
    setSupaKey(newKey);
    setSupaKeyInput('');
  }
  const curUrl=supaUrl.trim();
  if(curUrl){
    localStorage.setItem('eureka_supa_url',curUrl);
    window._supaUrl=curUrl;
  }
  await testerConnexion();
}
async function migrerVersSupabase(){
  if(!window.db.ready){alert("Configurez d'abord la clé API.");return;}
  if(!await showConfirm("Migrer TOUTES les données vers Supabase ?\n\nCela écrasera les données existantes sur Supabase.")) return;
  setSupaMigrating(true);
  try{
    let msgs=[];
    if(prospects.length>0){
      const ok=await window.db.upsert('prospects',prospects.map(prospToSupa));
      msgs.push((ok?"✓":"✗")+" "+prospects.length+" dossiers");
    }
    if(agents.length>0){
      const ok=await window.db.upsert('agents',agents.map(agentToSupa));
      msgs.push((ok?"✓":"✗")+" "+agents.length+" agents");
    }
    if(users.length>0){
      const ok=await window.db.upsert('crm_users',users.map(userToSupa));
      msgs.push((ok?"✓":"✗")+" "+users.length+" utilisateurs");
    }
    const objRows=Object.entries(objectifs).map(([k,v])=>({agent_id:k,valeur:parseInt(v)||0}));
    if(objRows.length>0){
      const ok=await window.db.upsert('objectifs',objRows);
      msgs.push((ok?"✓":"✗")+" "+objRows.length+" objectifs");
    }
    const recentJournal=journal.slice(0,100);
    if(recentJournal.length>0){
      const ok=await window.db.insert('journal',recentJournal.map(journalToSupa));
      msgs.push((ok?"✓":"✗")+" "+recentJournal.length+" entrées journal");
    }
    log("Migration Supabase",""+prospects.length+" dossiers, "+agents.length+" agents");
    setSupaStatus('ok');
    alert("Migration terminée !\n\n"+msgs.join("\n"));
  }catch(e){
    alert("Erreur migration : "+e.message);
  }finally{
    setSupaMigrating(false);
  }
}
async function rechargerDepuisSupabase(){
  if(!window.db.ready){alert("Configurez d'abord la clé API.");return;}
  await refreshFromSupabase();
  alert("✓ Données rechargées depuis Supabase !");
}
async function exporterSauvegardeLocale(){
  if(!window.db.ready){alert("Configurez d'abord la clé API Supabase.");return;}
  try{
    const [rP,rA,rU,rO,rJ,rC]=await Promise.all([
      window.db.select('prospects'),
      window.db.select('agents'),
      window.db.select('crm_users'),
      window.db.select('objectifs'),
      window.db.select('journal'),
      window.db.select('config'),
    ]);
    const backup={
      version:"1.0",
      date:new Date().toISOString(),
      projet:"qjruqilnevfdbzsobrmu",
      tables:{
        prospects:rP||[],
        agents:rA||[],
        crm_users:rU||[],
        objectifs:rO||[],
        journal:rJ||[],
        config:rC||[],
      }
    };
    const blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const dateStr=new Date().toISOString().slice(0,10);
    a.href=url; a.download=`eureka-backup-${dateStr}.json`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    const ts=new Date().toISOString();
    localStorage.setItem('eureka_last_backup',ts);
    setDerniereBackup(ts);
    log("Sauvegarde exportée","Backup JSON téléchargé le "+dateStr);
    alert("✓ Sauvegarde téléchargée : eureka-backup-"+dateStr+".json\n\n"+
      "Prospects : "+(rP||[]).length+"\nAgents : "+(rA||[]).length+
      "\nUtilisateurs : "+(rU||[]).length+"\nJournal : "+(rJ||[]).length+" entrées");
  }catch(e){
    alert("✗ Erreur lors de l'export : "+e.message);
  }
}

    </div>
    <div style={{fontSize:15,color:"#ffffff",marginBottom:24,lineHeight:1.6,whiteSpace:"pre-line"}}>{confirmModal.msg}</div>
    <div style={{display:"flex",gap:12,justifyContent:"flex-end"}}>
      <button onClick={()=>{confirmModal.resolve(false);setConfirmModal(null);}}
        style={{padding:"9px 22px",borderRadius:8,border:`1px solid ${JV}44`,background:"transparent",color:"#ffffff",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"'Poppins',sans-serif"}}>
        Annuler
      </button>
      <button onClick={()=>{confirmModal.resolve(true);setConfirmModal(null);}}
        style={{padding:"9px 22px",borderRadius:8,border:"none",background:JV,color:BR,fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"'Poppins',sans-serif"}}>
        Confirmer
      </button>
    </div>
  </div>
</div>
)}

{/* ══ MODAL EXPIRATION MDP ══════════════════════════════════════════════ */}
{showMdpExpire&&mdpExpireUser&&(
<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
  <div style={{background:"#1a1c3a",border:`2px solid #f59e0b`,borderRadius:14,padding:"28px 32px",maxWidth:440,width:"100%",boxShadow:"0 0 40px #0008",fontFamily:"'Poppins',sans-serif"}}>
    <div style={{fontSize:22,fontWeight:800,color:"#f59e0b",marginBottom:8,display:"flex",alignItems:"center",gap:10}}>
      🔑 Renouvellement du mot de passe
    </div>
    <div style={{fontSize:14,color:"#c8d0f0",marginBottom:20,lineHeight:1.6}}>
      Votre mot de passe a expiré (plus de 90 jours). Vous devez le renouveler pour continuer.
    </div>
    <div style={{marginBottom:16}}>
      <div style={{fontSize:13,color:"#8892be",marginBottom:6,fontWeight:600}}>NOUVEAU MOT DE PASSE</div>
      <input className="field" type="password" placeholder="Minimum 4 caractères" value={mdpExpireNew}
        onChange={e=>setMdpExpireNew(e.target.value)}
        onKeyDown={e=>{if(e.key==="Enter")document.getElementById("btn-mdp-expire")?.click();}}
        autoFocus/>
    </div>
    <button id="btn-mdp-expire" style={{width:"100%",padding:"11px 0",borderRadius:8,border:"none",background:"#f59e0b",color:"#1a1c3a",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"'Poppins',sans-serif"}}
      onClick={async()=>{
        if(!mdpExpireNew||mdpExpireNew.length<4){alert("Le mot de passe doit faire au moins 4 caractères.");return;}
        const now=new Date().toISOString();
        const updated={...mdpExpireUser,mdp:mdpExpireNew,mdpChangeAt:now};
        setUsers(us=>us.map(u=>u.id===updated.id?updated:u));
        if(window.db&&window.db.ready){
          const su=userToSupa(updated);
          window.db.rpc('save_user',{p_id:su.id,p_login:su.login,p_mdp:mdpExpireNew,p_nom:su.nom||"",p_prenom:su.prenom||"",p_role:su.role||"agent",p_agent_id:su.agent_id||null,p_statut:su.statut||"agent_confirme"}).catch(()=>{});
          fetch(window._supaUrl+'/rest/v1/crm_users?id=eq.'+encodeURIComponent(updated.id),{method:'PATCH',headers:{'apikey':window._supaKey,'Authorization':'Bearer '+window._supaKey,'Content-Type':'application/json'},body:JSON.stringify({mdp_change_at:now})}).catch(()=>{});
        }
        log("Mot de passe renouvelé (expiration 90j)",updated.login);
        setShowMdpExpire(false);setMdpExpireUser(null);setMdpExpireNew("");
        alert("✅ Mot de passe mis à jour. Conservez-le en lieu sûr.");
      }}>
      Enregistrer le nouveau mot de passe
    </button>
  </div>
</div>
)}

{/* Recherche contextuelle inline — désormais intégrée dans la barre du haut */}

{/* Toast erreur Supabase — visible sur toute l'app */}
{SupaErrToast}

</div>
);
}


    // ── Mount ─────────────────────────────────────────────────────────────
    // Annuler le fallback timeout APRÈS montage réussi seulement
    try {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(React.createElement(EurekaCRM));
      if (window._crmLoadTimeout) clearTimeout(window._crmLoadTimeout);
    } catch(mountErr) {
      console.error('[CRM] Erreur montage React:', mountErr);
      var el = document.getElementById('loading-msg');
      if (el) el.innerHTML = '❌ Erreur de démarrage du CRM.<br><span style="font-size:13px">' + mountErr.message + '</span><br><br>' +
        '<button onclick="location.reload()" style="margin-top:10px;padding:10px 24px;background:#F3E600;color:#07091a;border:none;border-radius:8px;font-weight:800;font-size:15px;cursor:pointer;font-family:Poppins,sans-serif">🔄 Recharger</button>';
    }
  </script>
</body>
</html>
