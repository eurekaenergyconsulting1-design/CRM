  <script>
    // Fallback : si React ne monte pas dans les 15s → afficher un message d'erreur avec bouton reload
    // Diagnostic progressif : met à jour le message toutes les 5s pour montrer l'avancement
    var _diagInterval = setInterval(function() {
      var el = document.getElementById('loading-msg');
      var screen = document.getElementById('static-loading');
      if (!screen || !document.getElementById('root').contains(screen)) { clearInterval(_diagInterval); return; }
      if (!el) return;
      var reactOk = typeof React !== 'undefined';
      var reactDomOk = typeof ReactDOM !== 'undefined';
      var babelOk = typeof Babel !== 'undefined';
      if (!reactOk || !reactDomOk || !babelOk) {
        el.textContent = '⚠ Chargement des librairies CDN… (vérifiez votre connexion)';
      } else {
        el.textContent = 'Compilation JSX en cours… (peut prendre 30-60 s sur certains appareils)';
      }
    }, 5000);
    window._crmLoadTimeout = setTimeout(function() { // 60s : Babel standalone est très lent sur gros fichier
      clearInterval(_diagInterval);
      var el = document.getElementById('loading-msg');
      var screen = document.getElementById('static-loading');
      if (screen && document.getElementById('root').contains(screen)) {
        var reactOk = typeof React !== 'undefined';
        var reactDomOk = typeof ReactDOM !== 'undefined';
        var babelOk = typeof Babel !== 'undefined';

      }

  <script>
    // Storage polyfill (localStorage backend)
    
window.storage = {
  async get(key) {
    try {
      const val = localStorage.getItem('eureka_' + key);
      if (val === null) throw new Error('Key not found');
      return { key, value: val };
    } catch(e) { throw e; }
  },
  async set(key, value) {
    try {
      localStorage.setItem('eureka_' + key, value);
      return { key, value };
    } catch(e) { return null; }
  },
  async delete(key) {
    localStorage.removeItem('eureka_' + key);
    return { key, deleted: true };
  },
  async list(prefix) {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('eureka_')) {
        const stripped = k.replace('eureka_', '');
        if (!prefix || stripped.startsWith(prefix)) keys.push(stripped);
      }
    }
    return { keys };
  }
};

  // ── Supabase REST Client léger — EurekaCRM ─────────────────────────────
  // Lit les clés depuis localStorage au démarrage
  (function(){
    window._supaUrl = localStorage.getItem('eureka_supa_url') || 'https://qjruqilnevfdbzsobrmu.supabase.co';
    window._supaKey = localStorage.getItem('eureka_supa_key') || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqcnVxaWxuZXZmZGJ6c29icm11Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzQzNDUsImV4cCI6MjA5MDQ1MDM0NX0.whiSdMQ6zLqE5iTBHf2nLvyHKyJm7emDW5cMjl4AwEo';
    // Réinitialiser le compteur d'échecs de connexion au démarrage
    // (évite les blocages locaux suite à des erreurs temporaires du CRM)
    try { localStorage.removeItem('eureka_sec_fails'); } catch(e) {}
  })();

  window.db = {
    get url(){ return window._supaUrl; },
    get key(){ return window._supaKey; },
    get ready(){ return !!(window._supaKey && window._supaKey.length > 20); },

    _h(extra){
      return Object.assign({
        'apikey': this.key,
        'Authorization': 'Bearer ' + this.key,
        'Content-Type': 'application/json'
      }, extra||{});
    },

    // Lire toutes les lignes d'une table (max 10 000)
    async select(table, opts){
      if(!this.ready) return null;
      opts = opts||{};
      var qs = 'limit=10000&order=' + (opts.order||'id');
      if(opts.filter) qs += '&' + opts.filter;
      try{
        var r = await fetch(this.url+'/rest/v1/'+table+'?'+qs, {headers:this._h()});
        if(!r.ok){ console.warn('[db.select]',table,r.status); return null; }
        return await r.json();
      }catch(e){ console.warn('[db.select] réseau:',e.message); return null; }
    },

    // Insérer ou mettre à jour (merge par PK)
    async upsert(table, rows){
      if(!this.ready) return false;
      var arr = Array.isArray(rows)?rows:[rows];
      if(!arr.length) return true;
      try{
        var r = await fetch(this.url+'/rest/v1/'+table, {
          method:'POST',
          headers:this._h({'Prefer':'resolution=merge-duplicates,return=minimal'}),
          body:JSON.stringify(arr)
        });
        if(!r.ok){ var t=await r.text(); console.warn('[db.upsert]',table,r.status,t); return false; }
        return true;
      }catch(e){ console.warn('[db.upsert] réseau:',e.message); return false; }
    },

    // Insérer (sans merge)
    async insert(table, rows){
      if(!this.ready) return false;
      var arr = Array.isArray(rows)?rows:[rows];
      if(!arr.length) return true;
      try{
        var r = await fetch(this.url+'/rest/v1/'+table, {
          method:'POST',
          headers:this._h({'Prefer':'return=minimal'}),
          body:JSON.stringify(arr)
        });
        if(!r.ok){ console.warn('[db.insert]',table,r.status); return false; }
        return true;
      }catch(e){ console.warn('[db.insert] réseau:',e.message); return false; }
    },

    // Supprimer une ligne par colonne = valeur
    async del(table, col, val){
      if(!this.ready) return false;
      try{
        var r = await fetch(this.url+'/rest/v1/'+table+'?'+col+'=eq.'+encodeURIComponent(val), {
          method:'DELETE',
          headers:this._h()
        });
        if(!r.ok){ console.warn('[db.del]',table,r.status); return false; }
        return true;
      }catch(e){ console.warn('[db.del] réseau:',e.message); return false; }
    },

    // Appel RPC (fonction Postgres SECURITY DEFINER)
    async rpc(fn, params){
      if(!this.ready) return null;
      try{
        var r = await fetch(this.url+'/rest/v1/rpc/'+fn, {
          method:'POST',
          headers:this._h(),
          body: JSON.stringify(params||{})
        });
        if(!r.ok){ var t=await r.text(); console.warn('[db.rpc]',fn,r.status,t); return null; }
        // RPCs void retournent 204 No Content — traiter comme succès
        if(r.status===204||r.headers.get('content-length')==='0') return true;
        const txt=await r.text();
        if(!txt||txt.trim()==='') return true;
        return JSON.parse(txt);
      }catch(e){ console.warn('[db.rpc] réseau:',e.message); return null; }
    },

    // Tester la connexion
    async ping(){
      if(!this.ready) return 'not_configured';
      try{
        var r = await fetch(this.url+'/rest/v1/agents?limit=1', {headers:this._h()});
        return r.ok ? 'ok' : 'error_'+r.status;
      }catch(e){ return 'unreachable'; }
    }
  };
  </script>

  <script>
  // ── Email helper — appel Edge Function Supabase → Resend ─────────────────
  // Utilisation : await window.email.send({ to, subject, html })
  // Prérequis   : Edge Function "send-email" déployée sur Supabase
  //               + secret RESEND_API_KEY configuré (supabase secrets set ...)
  window.email = {

    // URL de la Edge Function (calculée depuis l'URL Supabase configurée)
    get _url() {
      return (window._supaUrl || 'https://qjruqilnevfdbzsobrmu.supabase.co')
             + '/functions/v1/send-email';
    },

    // ── Envoyer un email via la Edge Function ─────────────────────────────
    // opts = { to: string, subject: string, html: string, from?: string }
    // Retourne { ok: true, id: '...' }  ou  { ok: false, error: '...' }
    async send(opts) {
      if (!opts || !opts.to || !opts.subject || !opts.html) {
        return { ok: false, error: 'Paramètres manquants (to, subject, html)' };
      }
      try {
        var res = await fetch(this._url, {
          method: 'POST',
          headers: {
            'Content-Type':  'application/json',
            'Authorization': 'Bearer ' + (window._supaKey || ''),
            'apikey':         window._supaKey || ''
          },
          body: JSON.stringify({
            to:      opts.to,
            subject: opts.subject,
            html:    opts.html,
            from:    opts.from || undefined
          })
        });
        var data = {};
        try { data = await res.json(); } catch(e) { /* réponse non-JSON */ }
        if (!res.ok) {
          var errMsg = data.error || data.message || ('Erreur HTTP ' + res.status);
          console.warn('[email.send] Échec:', errMsg, data);
          return { ok: false, error: errMsg };
        }
        return { ok: true, id: data.id || null };
      } catch(e) {
        console.warn('[email.send] Erreur réseau:', e.message);
        return { ok: false, error: e.message };
      }
    },

    // ── Remplacer les variables du template ──────────────────────────────
    // Variables supportées : [Prénom Décideur], [Décideur], [Société],
    //   [Fournisseur Proposé], [Date Échéance], [Durée], [Nom Agent], [Année+1]
    fillTemplate(tpl, prospect, agent) {
      if (!tpl) return '';
      var prenom     = (prospect.decideur || '').split(' ')[0] || 'Madame/Monsieur';
      var agentNom   = agent ? (agent.nom || "L'équipe Eureka") : "L'équipe Eureka";
      var fournisseur = prospect.fournisseurPropose_elec
                     || prospect.fournisseurPropose_gaz
                     || 'notre partenaire sélectionné';
      var dateEch    = prospect.dateEch_elec || prospect.dateEch_gaz || 'à définir';
      var duree      = prospect.duree_elec   || prospect.duree_gaz   || '3';
      var annee1     = String(new Date().getFullYear() + 1);
      return tpl
        .replace(/\[Prénom Décideur\]/g,    prenom)
        .replace(/\[Décideur\]/g,           prospect.decideur || 'Madame/Monsieur')
        .replace(/\[Société\]/g,            prospect.societe  || '')
        .replace(/\[Fournisseur Proposé\]/g, fournisseur)
        .replace(/\[Date Échéance\]/g,      dateEch)
        .replace(/\[Durée\]/g,              duree)
        .replace(/\[Nom Agent\]/g,          agentNom)
        .replace(/\[Année\+1\]/g,           annee1);
    },

    // ── Convertir texte brut en HTML sécurisé ────────────────────────────
    textToHtml(text) {
      if (!text) return '';
      var escaped = text
        .replace(/&/g,  '&amp;')
        .replace(/</g,  '&lt;')
        .replace(/>/g,  '&gt;')
        .replace(/\n/g, '<br/>');
      return '<div style="font-family:Arial,Helvetica,sans-serif;'
           + 'font-size:15px;line-height:1.75;color:#222;">'
           + escaped + '</div>';
    }
  };
  </script>

function useIsMobile() {
const[isMobile,setIsMobile]=useState(()=>window.innerWidth<768);
useEffect(()=>{
const fn=()=>setIsMobile(window.innerWidth<768);
window.addEventListener("resize",fn);
return()=>window.removeEventListener("resize",fn);
},[]);
return isMobile;
}
function useIsTablet() {
const[isTablet,setIsTablet]=useState(()=>window.innerWidth>=768&&window.innerWidth<1024);
useEffect(()=>{
const fn=()=>setIsTablet(window.innerWidth>=768&&window.innerWidth<1024);
window.addEventListener("resize",fn);
return()=>window.removeEventListener("resize",fn);
},[]);
return isTablet;
}

// CAR(MWh) × durée(ans) × marge(€/MWh)
function calcValeur(carE,dureeE,margeE,carG,dureeG,margeG){
const ce=parseFloat(carE)||0,de=parseFloat(dureeE)||0,me=parseFloat(margeE)||0;
const cg=parseFloat(carG)||0,dg=parseFloat(dureeG)||0,mg=parseFloat(margeG)||0;
const fournE=ce*de*me; const fournG=cg*dg*mg;
const fourn = Math.round(fournE+fournG);
if(fourn<=0) return null;
const neogies= Math.round(fourn/2);
const eureka = Math.round(neogies/2);
return {fourn,neogies,eureka,fournE:Math.round(fournE),fournG:Math.round(fournG)};
}
function getEssai(dateDebut){
if(!dateDebut) return {enEssai:false,moisEcoules:0};
const m=Math.floor((Date.now()-new Date(dateDebut))/(1000*60*60*24*30.44));
return m<3 ? {enEssai:true,moisEcoules:m} : {enEssai:false,moisEcoules:m};
}
function calcComm(margeFourn,dateDebut,moisStr,paliers,targets=TARGETS_ESSAI){
if(!dateDebut) return null;
const[a,m]=moisStr.split("-").map(Number);
const d=Math.floor((new Date(a,m-1,1)-new Date(dateDebut))/(1000*60*60*24*30.44));
if(d<0) return null;
if(d<3){
const t=(targets||TARGETS_ESSAI)[Math.min(d,2)];
return margeFourn>=t
? {taux:TAUX_ESSAI,atteint:true,target:t,essai:true,moisEssai:d+1}
: {taux:0,atteint:false,target:t,manque:t-margeFourn,essai:true,moisEssai:d+1};
}
const p=paliers.find(x=>margeFourn>=x.minCA&&margeFourn<=x.maxCA)||paliers.filter(x=>x.taux>0).sort((a,b)=>b.minCA-a.minCA)[0]||paliers[paliers.length-1];
const n=paliers.find(x=>x.minCA>margeFourn);
return {taux:p.taux,label:p.label,atteint:p.taux>0,
manque:p.taux===0?(paliers.find(x=>x.taux>0)?.minCA||6000)-margeFourn:n?n.minCA-margeFourn:0,
nextLabel:n?.label,essai:false};
}
function getUrgence(dE,dG){
let d = null;
if(dE && dG) d = new Date(dE)<new Date(dG)?dE:dG;
else if(dE) d = dE; else if(dG) d = dG;
if(!d) return null;
const m=(new Date(d)-new Date())/(1000*60*60*24*30.44);
if(m<0) return {label:"Échéance dépassée", color:"#f87171",bg:"#2a0808",prio:0};
if(m<=24) return {label:"🔴 Négociable maintenant", color:"#ef4444", bg:"#2a0808", prio:4};
if(m<=26) return {label:"🟡 Bientôt négociable", color:"#fbbf24",bg:"#2a1f05",prio:3};
return {label:`Échéance lointaine (${Math.round(m)} mois)`,color:"#6b7280",bg:"#111828",prio:1};
}
function getRgpd(dateRgpd,dateEchE,dateEchG){
// Alerte RGPD uniquement si le dossier EST dans la fenêtre utile (<= 24 mois avant échéance)
const u=(dateEchE||dateEchG)?getUrgence(dateEchE,dateEchG):null;
const dansFenotreUtile=u&&u.prio>=2; // prio 2 = bientôt négociable, 3 = neg dans 6 mois, 4 = neg maintenant
if(!dateRgpd) return {valid:false,label:"RGPD manquant",color:"#f87171",alerte:dansFenotreUtile,expire:false};
const exp=new Date(dateRgpd); exp.setFullYear(exp.getFullYear()+1);
const jours=Math.ceil((exp-new Date())/(1000*60*60*24));
const dTarget = (dateEchE&&dateEchG)?(new Date(dateEchE)<new Date(dateEchG)?dateEchE:dateEchG):(dateEchE||dateEchG);
const negoDate=dTarget?new Date(new Date(dTarget).getTime()-24*30.44*24*60*60*1000):null;
const aRecupAvant=negoDate?fmtDate(negoDate.toISOString().split("T")[0]):null;
if(jours<0) return {valid:false,label:"RGPD expiré", color:"#f87171",bg:"#2a0a0a",expire:true, expDate:fmtDate(exp.toISOString().split("T")[0]),aRecupAvant,alerte:dansFenotreUtile};
if(jours<30) return {valid:true, label:`RGPD expire dans ${jours}j`,color:"#fbbf24",bg:"#2a1f05",expire:false,expDate:fmtDate(exp.toISOString().split("T")[0]),aRecupAvant,alerte:dansFenotreUtile};
return {valid:true, label:`RGPD valide (${jours}j)`, color:GRc,bg:"#0a2010",expire:false,expDate:fmtDate(exp.toISOString().split("T")[0]),aRecupAvant,alerte:false};
}
function getRappel(d){
if(!d) return null;
const j=Math.ceil((new Date(d)-new Date())/(1000*60*60*24));
if(j<0) return {label:`Rappel en retard (${Math.abs(j)}j)`,color:"#f87171",urgent:true};
if(j===0)return {label:"Rappel aujourd'hui",color:JV,urgent:true};
if(j<=3) return {label:`Rappel dans ${j} jour(s)`,color:"#fbbf24",urgent:false};
return {label:`Rappel le ${fmtDate(d)}`,color:"#8892be",urgent:false};
}

}
// ─── SCORE DE QUALIFICATION AUTOMATIQUE 0-100 ────────────────
// Critères pondérés :
// Fenêtre négociation : 35 pts — le plus important
// RGPD valide : 20 pts — sans ACD, pas d'offre
// CAR (volume) : 20 pts — valeur potentielle du dossier
// Score Elipro : 15 pts — solidité financière du client
// Segment : 10 pts — attractivité du profil
function getScoreQualif(p){
let score=0; const detail={};
// 1. Fenêtre de négociation (35 pts)
const u=getUrgence(p.dateEch_elec,p.dateEch_gaz);
if(u){
if(u.prio===4){score+=35;detail.fenetre={pts:35,label:"Négociable maintenant"};}
else if(u.prio===3){score+=25;detail.fenetre={pts:25,label:"Bientôt négociable"};}
else if(u.prio===2){score+=10;detail.fenetre={pts:10,label:"Dans 6-12 mois"};}
else if(u.prio===1){score+=2;detail.fenetre={pts:2,label:"Lointain"};}
else{detail.fenetre={pts:0,label:"Dépassé"};}
} else {detail.fenetre={pts:0,label:"Échéance manquante"};}
// 2. RGPD / ACD (20 pts)
const rg=getRgpd(p.dateRgpd,p.dateEch_elec,p.dateEch_gaz);
if(rg.valid&&!rg.expire){score+=20;detail.rgpd={pts:20,label:"RGPD valide"};}
else if(p.dateRgpd&&rg.expire){score+=5;detail.rgpd={pts:5,label:"RGPD expiré"};}
else{detail.rgpd={pts:0,label:"Pas de RGPD"};}
// 3. CAR — Consommation annuelle (20 pts)
const car=(parseFloat(p.car_elec)||0)+(parseFloat(p.car_gaz)||0);
if(car>=500){score+=20;detail.car={pts:20,label:`${car} MWh (très élevée)`};}
else if(car>=100){score+=15;detail.car={pts:15,label:`${car} MWh (élevée)`};}
else if(car>=30){score+=10;detail.car={pts:10,label:`${car} MWh (standard)`};}
else if(car>0){score+=4;detail.car={pts:4,label:`${car} MWh (faible)`};}
else{detail.car={pts:0,label:"CAR non renseignée"};}
// 4. Score Elipro (15 pts)
const elipro=parseFloat(p.scoreElipro)||0;
if(elipro>=8){score+=15;detail.elipro={pts:15,label:`Elipro ${elipro}/10 (excellent)`};}
else if(elipro>=6){score+=10;detail.elipro={pts:10,label:`Elipro ${elipro}/10 (bon)`};}
else if(elipro>=4){score+=5;detail.elipro={pts:5,label:`Elipro ${elipro}/10 (moyen)`};}
else if(elipro>0){score+=2;detail.elipro={pts:2,label:`Elipro ${elipro}/10 (faible)`};}
else{detail.elipro={pts:0,label:"Elipro non renseigné"};}
// 5. Segment (10 pts)
const segMap={C1:10,C2:8,C3:7,C4:6,C5:4};
const segPts=segMap[p.segment_elec]||0;
score+=segPts;
detail.segment={pts:segPts,label:p.segment_elec?`Segment ${p.segment_elec}`:"Segment inconnu"};
// Couleur selon score
const color=score>=75?GRc:score>=50?"#fbbf24":score>=30?"#fb923c":"#f87171";
const label=score>=75?"Très qualifié":score>=50?"Qualifié":score>=30?"À travailler":"Faible potentiel";
return{score,color,label,detail};
}

// ─── COMPOSANT DateRangePicker ────────────────────────
function DateRangePicker({debut, fin, onChange, onClose, T:Tp}){
  // Popup fond sombre fixe → textes toujours clairs (dark mode colors)
  const T={...Tp,text:"#e8eaf6",sub:"#c8d0f0",muted:"#8892be",bord:"#1e2d5e"};
  const nw=new Date();
  const [leftY,setLeftY]=useState(()=>debut?new Date(debut).getFullYear():nw.getFullYear());
  const [leftM,setLeftM]=useState(()=>debut?new Date(debut).getMonth():nw.getMonth());
  const [tmpDebut,setTmpDebut]=useState(debut||"");
  const [tmpFin,setTmpFin]=useState(fin||"");
  const [hovDate,setHovDate]=useState(null);
  const rightM=leftM===11?0:leftM+1;
  const rightY=leftM===11?leftY+1:leftY;
  const MOIS_N2=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
  function prevMth(){if(leftM===0){setLeftY(y=>y-1);setLeftM(11);}else setLeftM(m=>m-1);}
  function nextMth(){if(leftM===11){setLeftY(y=>y+1);setLeftM(0);}else setLeftM(m=>m+1);}
  function dayStr(y,m,d){return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;}
  function handleDay(ds){
    if(!tmpDebut||(tmpDebut&&tmpFin)){setTmpDebut(ds);setTmpFin("");}
    else{if(ds<tmpDebut){setTmpFin(tmpDebut);setTmpDebut(ds);}else setTmpFin(ds);}
  }
  function inRange(ds){
    const d=tmpDebut,f=tmpFin||(tmpDebut&&!tmpFin?hovDate:null);
    if(!d)return false;
    if(!f)return ds===d;
    const lo=d<f?d:f,hi=d<f?f:d;
    return ds>=lo&&ds<=hi;
  }
  function renderMonth(y,m){
    const days=new Date(y,m+1,0).getDate();
    let fw=new Date(y,m,1).getDay(); fw=fw===0?6:fw-1;
    const cells=[];
    for(let i=0;i<fw;i++) cells.push(null);
    for(let d=1;d<=days;d++) cells.push(d);
    const today=new Date().toISOString().split("T")[0];
    return(
      <div style={{flex:1,minWidth:200}}>
        <div style={{textAlign:"center",fontWeight:700,fontSize:15,color:T.text,marginBottom:10}}>{MOIS_N2[m]} {y}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1}}>
          {["L","M","M","J","V","S","D"].map((d,i)=>(
            <div key={i} style={{textAlign:"center",fontSize:14,color:T.muted,fontWeight:700,padding:"4px 0"}}>{d}</div>
          ))}
          {cells.map((day,i)=>{
            if(!day)return <div key={i}/>;
            const ds=dayStr(y,m,day);
            const isS=ds===tmpDebut,isE=ds===tmpFin;
            const inR=inRange(ds);
            const isTod=ds===today;
            return(
              <div key={i} onClick={()=>handleDay(ds)}
                onMouseEnter={()=>{if(tmpDebut&&!tmpFin)setHovDate(ds);}}
                onMouseLeave={()=>setHovDate(null)}
                style={{textAlign:"center",padding:"6px 2px",fontSize:14,cursor:"pointer",borderRadius:6,
                  background:isS||isE?JV:inR?`${JV}22`:"transparent",
                  color:isS||isE?BR:inR?JV:isTod?JV:T.text,
                  fontWeight:isS||isE?800:isTod?700:400,transition:".1s"
                }}>{day}</div>
            );
          })}
        </div>
      </div>
    );
  }
  const lbl=tmpDebut?(tmpFin?`${fmtDate(tmpDebut)} — ${fmtDate(tmpFin)}`:fmtDate(tmpDebut)):"Sélectionnez une plage de dates";
  return(
    <div style={{position:"fixed",inset:0,zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",background:"#00000077"}}
      onClick={onClose}>
      <div style={{background:"linear-gradient(135deg,#0f1630,#07091a)",border:`2px solid ${JV}55`,borderTop:`3px solid ${JV}`,borderRadius:16,padding:24,boxShadow:`0 20px 60px #000000cc,0 0 30px ${JV}22`,maxWidth:"94vw"}}
        onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:20}}>
          <button className="btn-ghost" style={{padding:"6px 12px",flexShrink:0}} onClick={prevMth}>‹</button>
          <div style={{display:"flex",gap:32,flex:1}}>
            {renderMonth(leftY,leftM)}
            {renderMonth(rightY,rightM)}
          </div>
          <button className="btn-ghost" style={{padding:"6px 12px",flexShrink:0}} onClick={nextMth}>›</button>
        </div>
        {/* Saisie manuelle */}
        <div style={{display:"flex",gap:10,marginTop:12,padding:"12px 0",borderTop:`1px solid ${T.bord}`,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{fontSize:13,color:T.muted,fontWeight:600,flexShrink:0}}>Saisie manuelle :</div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:13,color:T.sub}}>Début</span>
            <input type="date" className="field" style={{width:150,padding:"6px 10px",fontSize:13}} value={tmpDebut}
              onChange={e=>{setTmpDebut(e.target.value);if(e.target.value) setLeftY(new Date(e.target.value).getFullYear());}}/>
          </div>
          <span style={{color:T.muted}}>—</span>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:13,color:T.sub}}>Fin</span>
            <input type="date" className="field" style={{width:150,padding:"6px 10px",fontSize:13}} value={tmpFin}
              onChange={e=>setTmpFin(e.target.value)}/>
          </div>
          {(tmpDebut||tmpFin)&&<button className="btn-ghost" style={{fontSize:12,padding:"4px 10px",color:"#f87171",borderColor:"#f8717144"}} onClick={()=>{setTmpDebut("");setTmpFin("");}}>✕ Effacer</button>}
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:10,flexWrap:"wrap",gap:10}}>
          <div style={{fontSize:14,fontWeight:700,color:T.text}}>{lbl}</div>
          <div style={{display:"flex",gap:10}}>
            <button className="btn-ghost" onClick={()=>onClose()}>Annuler</button>
            <button className="btn-primary" onClick={()=>{onChange(tmpDebut,tmpFin);onClose();}}>Appliquer</button>
          </div>
        </div>
      </div>
    </div>
  );
}
// ─── Détection device / navigateur ───────────────────
function getDeviceInfo(){
  const ua=navigator.userAgent||"";
  let browser="Inconnu";
  if(ua.includes("Edg/")) browser="Edge";
  else if(ua.includes("OPR/")||ua.includes("Opera/")) browser="Opera";
  else if(ua.includes("Chrome/")) browser="Chrome";
  else if(ua.includes("Firefox/")) browser="Firefox";
  else if(ua.includes("Safari/")&&!ua.includes("Chrome/")) browser="Safari";
  let device="Desktop";
  if(/Android|webOS|iPhone|iPad|iPod/i.test(ua)) device=/iPad/i.test(ua)?"Tablette":"Mobile";
  let os="";
  if(ua.includes("Windows")) os="Windows";
  else if(ua.includes("Mac OS X")) os="macOS";
  else if(ua.includes("Android")) os="Android";
  else if(/iPhone|iPad|iPod/.test(ua)) os="iOS";
  else if(ua.includes("Linux")) os="Linux";
  return{browser,device,os,summary:`${browser} / ${os||device}`};
}

const _secFails={};   // {login: count} — session courante
// ─── LOGIN ───────────────────────────────────────────
function LoginPage({onLogin,tm,usersList,agentsList}){
const T=THEMES[tm];
const[login,setLogin]=useState(""),[ mdp,setMdp]=useState(""),[ err,setErr]=useState(""),[ loading,setLoading]=useState(false);
// ── Helpers sécurité ──
function getFails(lg){
  try{const s=JSON.parse(localStorage.getItem('eureka_sec_fails')||'{}');return s[lg.toLowerCase()]||0;}catch(e){return 0;}
}
function incFails(lg){
  try{
    const s=JSON.parse(localStorage.getItem('eureka_sec_fails')||'{}');
    const loginKey=lg.toLowerCase();
    s[loginKey]=(s[loginKey]||0)+1;
    localStorage.setItem('eureka_sec_fails',JSON.stringify(s));
    return s[loginKey];
  }catch(e){return(_secFails[lg.toLowerCase()]=(_secFails[lg.toLowerCase()]||0)+1);}
}
function clearFails(lg){
  try{const s=JSON.parse(localStorage.getItem('eureka_sec_fails')||'{}');delete s[lg.toLowerCase()];localStorage.setItem('eureka_sec_fails',JSON.stringify(s));}catch(e){}
  delete _secFails[lg.toLowerCase()];
}

async function bloquerCompte(lg){
  if(!window.db||!window._supaUrl||!window._supaKey) return;
  fetch(window._supaUrl+'/rest/v1/crm_users?login=eq.'+encodeURIComponent(lg),{

async function go(){
setLoading(true);setErr("");
const loginL=login.toLowerCase().trim();
// ── Vérification blocage local ──
if(getFails(loginL)>=3){
  setErr("⛔ Compte bloqué après 3 tentatives. Contactez l'administrateur.");
  setLoading(false);return;
}
try{
  if(window.db&&window.db.ready){
    // === AUTH SUPABASE (priorité) ===
    const rows=await window.db.rpc('authenticate_user',{p_login:login.trim(),p_mdp:mdp});
    if(rows&&rows.length>0){
      const r=rows[0];
      // ── Vérification statut bloqué ──
      if(r.statut==='bloque'){
        await logEchec(login.trim(),"Compte bloqué");
        setErr("⛔ Votre compte a été bloqué. Contactez l'administrateur.");
        setLoading(false);return;
      }
      // ── Succès : réinitialiser les tentatives ──
      clearFails(loginL);
      const uLocal=usersList.find(x=>String(x.id)===String(r.id));
      onLogin({id:r.id,login:r.login,nom:r.nom,prenom:r.prenom,role:r.role,agentId:r.agent_id,mdp:uLocal?uLocal.mdp:""});
      return;
    }
    // === FALLBACK LOCAL ===
    const uLocal=usersList.find(x=>x.login===login.trim()&&x.mdp===mdp);
    if(uLocal){
      if(uLocal.statut==='bloque'){
        await logEchec(login.trim(),"Compte bloqué");
        setErr("⛔ Votre compte a été bloqué. Contactez l'administrateur.");
        setLoading(false);return;
      }
      clearFails(loginL);
      onLogin(uLocal);
      const su=userToSupa(uLocal);
      window.db.rpc('save_user',{p_id:su.id,p_login:su.login,p_mdp:su.mdp||"",p_nom:su.nom||"",p_prenom:su.prenom||"",p_role:su.role||"agent",p_agent_id:su.agent_id||null,p_statut:su.statut||"agent_confirme"}).catch(()=>{});
      if(uLocal.agentId){const _ags=agentsList||window.__eurekaAgents||[];const ag=_ags.find(a=>a.id===uLocal.agentId);if(ag)window.db.upsert('agents',[agentToSupa(ag)]).catch(()=>{});}
      return;
    }
    // === ÉCHEC D'AUTHENTIFICATION ===
    const nb=incFails(loginL);
    await logEchec(login.trim(),`Identifiant/MDP incorrect (tentative ${nb}/3)`);
    if(nb>=3){
      await bloquerCompte(login.trim());
      setErr("⛔ Compte bloqué après 3 tentatives échouées. Contactez l'administrateur.");
    } else {
      setErr(`Identifiant ou mot de passe incorrect. (${nb}/3 tentative${nb>1?"s":""})`);
    }
    setLoading(false);return;
  }
  // === AUTH LOCALE PURE ===
  const u=usersList.find(x=>x.login===login.trim()&&x.mdp===mdp);
  if(u){
    if(u.statut==='bloque'){setErr("⛔ Votre compte a été bloqué. Contactez l'administrateur.");setLoading(false);return;}
    clearFails(loginL);onLogin(u);
  } else{
    const nb=incFails(loginL);
    if(nb>=3) setErr("⛔ Compte bloqué après 3 tentatives échouées. Contactez l'administrateur.");
    else setErr(`Identifiant ou mot de passe incorrect. (${nb}/3)`);
    setLoading(false);
  }
}catch(e){
  const u=usersList.find(x=>x.login===login.trim()&&x.mdp===mdp);
  if(u&&u.statut!=='bloque'){clearFails(loginL);onLogin(u);}
  else{setErr("Erreur réseau. Vérifiez votre connexion.");setLoading(false);}
}
}

{id:1,titre:"Fonctionnement du marché de l'énergie en France",categorie:"Marché de l'énergie",description:"Comprendre les acteurs, la chaîne de valeur et les mécanismes de formation des prix sur le marché électrique et gazier français.",
contenu:`LE MARCHÉ DE L'ÉNERGIE EN FRANCE — FONDAMENTAUX
1. LES ACTEURS CLÉS
• RTE (Réseau de Transport d'Électricité) : gestionnaire du réseau à haute tension. C'est lui qui équilibre l'offre et la demande en temps réel.
• Enedis : gestionnaire du réseau de distribution (basse et moyenne tension). Propriétaire des PDL (Points De Livraison). Il fournit les données de consommation via l'autorisation RGPD/ACD.
• Les fournisseurs : EDF, Engie, TotalEnergies, Vattenfall, Ekwateur... Ils achètent l'énergie sur les marchés de gros et la revendent aux entreprises.
• Les courtiers (vous) : vous êtes l'intermédiaire entre le fournisseur et l'entreprise cliente. Vous négociez les meilleures conditions tarifaires.
2. COMMENT SE FORME LE PRIX DE L'ÉLECTRICITÉ ?
Le prix de l'électricité en France est indexé sur le marché européen EPEX SPOT. Il dépend de :
• La demande (saisonnalité, température)
• L'offre (production nucléaire, renouvelables, centrales à gaz)
• Les prix des matières premières (gaz, charbon, CO₂)
• La géopolitique internationale
Prix spot = prix du marché à court terme (J-1)
Prix à terme = prix négocié pour livraison future (1, 2, 3 ans)
3. LA CHAÎNE DE VALEUR
Producteur → Marché de gros (EPEX) → Fournisseur → Courtier → Client final
Votre valeur ajoutée se situe entre le fournisseur et le client. Vous permettez au client d'accéder à des offres négociées qu'il n'obtiendrait pas seul.
4. LES TARIFS RÉGLEMENTÉS vs MARCHÉ LIBRE
Tarif réglementé (TRV) : fixé par l'État via la CRE (Commission de Régulation de l'Énergie). Accessible aux TPE et PME sous certains seuils.
Marché libre : offres négociées entre fournisseurs et clients. C'est votre terrain de jeu.
5. LE RÔLE DE LA CRE
La CRE régule le marché, contrôle les tarifs, et publie régulièrement des rapports sur l'évolution des prix. Surveiller les publications de la CRE vous donne des arguments béton en prospection.`,

{id:2,titre:"Comprendre la CAR, le PDL et les segments C1 à C5",categorie:"Marché de l'énergie",description:"Maîtriser les données techniques indispensables pour qualifier un prospect et calculer la valeur d'un dossier.",
contenu:`LES DONNÉES TECHNIQUES FONDAMENTALES DU COURTIER ÉNERGIE
1. LA CAR — CONSOMMATION ANNUELLE DE RÉFÉRENCE
La CAR (en MWh/an) est la consommation annuelle d'énergie d'un site. C'est la donnée la plus importante pour vous car :
• Elle détermine la valeur du dossier (CAR × durée × marge)
• Elle permet de qualifier le segment du client
• Elle figure sur la facture du client
Comment obtenir la CAR ?
→ Demandez la dernière facture d'énergie au prospect
→ Cherchez "consommation annuelle" ou "index de référence"
→ Elle est exprimée en MWh ou en kWh (divisez par 1000 pour obtenir des MWh)
2. LE PDL — POINT DE LIVRAISON
Le PDL est le numéro d'identification du compteur électrique d'un site. Il compte 14 chiffres. C'est grâce au PDL qu'Enedis peut transmettre les données de consommation à votre fournisseur partenaire.
→ Demandez-le toujours sur la facture
→ Sans PDL valide, pas d'offre possible
Pour le gaz : l'équivalent s'appelle PCE (Point de Comptage et d'Estimation)
3. LES SEGMENTS DE CONSOMMATION ÉLECTRIQUE
C5 — 0 à 36 kVA
→ Petits sites : commerces, cabinets médicaux, restaurants, agences
→ Compteur classique ou Linky
→ Volume faible mais très nombreux
C4 — 36 à 250 kVA
→ Moyennes entreprises : hôtels, supermarchés, PME industrielles
→ Compteur électronique
→ Excellent équilibre volume/valeur
C3 — 250 kVA à 1 MVA
→ Grandes entreprises et sites industriels moyens
→ Peu nombreux mais très forte valeur
C2 — 1 à 10 MVA
→ Grands sites industriels
→ Profils de consommation complexes
C1 — > 10 MVA
→ Très grands industriels, cimenteries, sidérurgie
→ Dossiers stratégiques, négociations très techniques
RÈGLE D'OR : Concentrez votre prospection sur les C4 et C5. Les C4 offrent le meilleur rapport valeur/effort.
4. LA PUISSANCE SOUSCRITE (en kVA)
C'est la puissance maximale que le client peut consommer à un instant T. Elle détermine le segment. Elle figure sur la facture sous "puissance souscrite" ou "PS".
5. CALCULER LA VALEUR D'UN DOSSIER
Formule : CAR (MWh) × Durée (ans) × Marge (€/MWh) = Marge fournisseur totale
Marge fournisseur ÷ 2 = Part Eureka + Neogies
Part Eureka + Neogies ÷ 2 = Part Eureka
Exemple : CAR 30 MWh × 3 ans × 20€/MWh = 1 800€ marge fournisseur → 900€ part Eureka/Neogies → 450€ part Eureka`,

{id:3,titre:"Les fournisseurs alternatifs : qui sont-ils et que proposent-ils ?",categorie:"Marché de l'énergie",description:"Connaître les acteurs du marché libre pour mieux conseiller vos clients et argumenter face à EDF.",
contenu:`LES FOURNISSEURS ALTERNATIFS — CE QUE TOUT COURTIER DOIT SAVOIR
1. POURQUOI LES FOURNISSEURS ALTERNATIFS EXISTENT
Depuis l'ouverture du marché à la concurrence (2007 pour les professionnels), les entreprises ne sont plus obligées de rester chez EDF ou Engie. Cette ouverture a créé des dizaines de fournisseurs alternatifs qui se battent pour conquérir des parts de marché — et c'est votre terrain de jeu.
2. LES PRINCIPAUX FOURNISSEURS
EDF : leader historique, tarifs souvent plus élevés mais rassure les clients prudents.
Engie : 2ème acteur, fort sur le gaz, présence nationale.
TotalEnergies : très actif sur le segment professionnel, offres compétitives.
Vattenfall : suédois, orienté énergies renouvelables.
Ekwateur : fournisseur vert, fort argument RSE pour les entreprises engagées.
Ohm Energie : bon rapport qualité-prix sur les segments C5.
3. LES TYPES D'OFFRES
Offre à prix fixe : le tarif est figé pour toute la durée du contrat. Idéal pour sécuriser le budget du client. Argument fort : "Vous êtes protégé des hausses futures."
Offre indexée : le prix suit l'évolution du marché. Peut être avantageux en période de baisse, risqué en période de hausse.
Offre verte : énergie garantie d'origine renouvelable (certificats GO). Argument RSE puissant pour les entreprises soucieuses de leur bilan carbone.
4. COMMENT CHOISIR LE BON FOURNISSEUR POUR VOTRE CLIENT
→ Analysez le profil de consommation (segment, CAR, saisonnalité)
→ Évaluez l'appétit au risque du dirigeant (prix fixe ou indexé ?)
→ Vérifiez les engagements RSE de l'entreprise (offre verte ?)
→ Comparez les offres via votre partenaire Neogies
5. L'ARGUMENT IMPARABLE FACE À "ON RESTE CHEZ EDF"
"Je comprends tout à fait, EDF c'est la sécurité. Mais depuis l'ouverture du marché, même les grands groupes français ont changé de fournisseur pour faire des économies sans perdre en qualité. En 10 minutes, on compare — si EDF est le meilleur, je vous le confirme et vous restez chez eux. Est-ce qu'on prend ces 10 minutes ?"`,

{id:4,titre:"Géopolitique et impact sur les prix de l'énergie",categorie:"Marché de l'énergie",description:"Comprendre comment les crises mondiales influencent directement vos arguments commerciaux et les prix du marché.",
contenu:`GÉOPOLITIQUE ET ÉNERGIE — CE QUE LES MEILLEURS COURTIERS SAVENT
1. POURQUOI LA GÉOPOLITIQUE EST UN ARGUMENT COMMERCIAL
Quand vous dites à un prospect "compte tenu des tensions actuelles en [région], les prix pourraient augmenter de X% d'ici votre prochaine révision", vous devenez un expert, pas un commercial lambda. C'est ce qui vous différencie.
2. LES FACTEURS GÉOPOLITIQUES QUI FONT BOUGER LES PRIX
Conflits en zones productrices :
→ Toute instabilité au Moyen-Orient (Iran, Irak, Yémen) fait monter le pétrole et indirectement le gaz.
→ Le conflit russo-ukrainien a causé la plus grande crise gazière européenne depuis 2022.
Sanctions économiques :
→ Les sanctions contre la Russie ont supprimé du marché européen des volumes massifs de gaz.
→ L'Europe a dû trouver d'autres sources (GNL américain, algérien, qatari).
Décisions des organisations :
→ L'OPEP+ (pétrole) et ses décisions de production influencent indirectement le marché du gaz et de l'électricité.
→ L'AIE (Agence Internationale de l'Énergie) publie des rapports de référence.
3. LE LIEN GAS → ÉLECTRICITÉ
En Europe, le prix du gaz naturel influence directement le prix de l'électricité. Pourquoi ? Parce que les centrales à gaz sont les "price makers" du marché électrique — elles fixent le prix marginal.
→ Prix gaz ↑ = Prix électricité ↑
→ C'est une réalité que vous devez expliquer à vos clients.
4. LES STOCKS GAZIERS EUROPÉENS
Chaque automne, l'Europe surveille ses niveaux de stockage de gaz (objectif : 90% avant l'hiver). Un hiver froid ou un été sans vent (moins d'éolien) peut créer une tension soudaine.
→ Argument : "Avec les niveaux de stock actuels et la saisonnalité, c'est maintenant qu'il faut figer votre tarif."
5. COMMENT UTILISER L'ACTUALITÉ EN PROSPECTION
MAUVAISE PRATIQUE : "Les prix vont exploser" (trop alarmiste, non vérifiable)
BONNE PRATIQUE : "Dans le contexte actuel, les entreprises qui ont anticipé en 2022 ont économisé en moyenne 30% vs marché spot. Notre rôle est de vous permettre de faire de même."
Utilisez toujours le widget Actualités du tableau de bord pour avoir les arguments du jour.`,

{id:5,titre:"Script d'appel — 1er contact et passage du barrage secrétariat",categorie:"Prospection",description:"Maîtriser les 60 premières secondes d'un appel de prospection pour maximiser vos chances d'atteindre le décideur.",
contenu:`SCRIPT D'APPEL — 1ER CONTACT
1. L'OBJECTIF DU 1ER APPEL
Le 1er appel n'a PAS pour objectif de vendre. Il a pour objectif de :
① Atteindre le bon décideur
② Qualifier rapidement (contrat échu ? qui gère l'énergie ?)
③ Créer suffisamment d'intérêt pour un 2ème échange
2. PASSER LE BARRAGE SECRÉTARIAT
Le/la secrétaire a pour mission de filtrer les appels. Ne jamais lui expliquer toute votre démarche.
VERSION DIRECTE :
"Bonjour, [Prénom] d'Eureka Energy Consulting. Je contacte votre direction dans le cadre d'un appel d'offres sur vos contrats énergie — électricité et gaz. C'est votre directeur général ou votre responsable administratif qui gère ça chez vous ?"
VERSION DOUCE :
"Bonjour, pourriez-vous me passer la personne qui s'occupe de vos factures d'énergie ou de vos contrats fournisseurs ?"
RÈGLE D'OR : Ne jamais expliquer tout votre offre à la secrétaire. Juste assez pour être transféré.
3. SCRIPT DÉCIDEUR — VERSION 1 (économies)
"Bonjour M./Mme [Nom], [Prénom] d'Eureka Energy Consulting. On accompagne des entreprises comme la vôtre dans la renégociation de leurs contrats énergie pour anticiper les hausses tarifaires. Est-ce que votre contrat actuel expire bientôt ?"
VERSION 2 (appel d'offres)
"Bonjour, je vous appelle car on lance un appel d'offres groupé sur l'énergie. Ça permet d'obtenir des tarifs plus compétitifs. Vous seriez ouvert à ce qu'on regarde ensemble ce que ça pourrait vous faire économiser ?"
VERSION 3 (urgence timing)
"Bonjour, on travaille en ce moment sur les renouvellements de contrats énergie avant la prochaine révision tarifaire. Les entreprises qui anticipent maintenant s'en sortent beaucoup mieux. Est-ce que vous savez quand expire votre contrat actuel ?"
4. LES 3 QUESTIONS DE QUALIFICATION OBLIGATOIRES
① "Votre contrat énergie expire quand ?" → détermine l'urgence
② "Vous êtes avec quel fournisseur actuellement ?" → permet de comparer
③ "C'est vous qui gérez ça ou c'est quelqu'un d'autre ?" → identifier le vrai décideur
5. SI LE PROSPECT RÉPOND "CONTRAT LOINTAIN"
"D'accord, dans combien de temps exactement ? 2028 ? Très bien. On travaille sur des renégociations jusqu'à 2 ans avant l'échéance — ça vous laisse le temps de comparer sereinement. Je vous rappelle dans [X mois]. Je note votre email pour vous envoyer une info marché d'ici là ?"
→ TOUJOURS sortir quelque chose : email, date de rappel, nom du décideur.`,

{id:6,titre:"La qualification prospect — Identifier les dossiers à fort potentiel",categorie:"Prospection",description:"Apprendre à qualifier rapidement un prospect pour concentrer ses efforts sur les dossiers les plus rentables.",
contenu:`QUALIFIER UN PROSPECT — LA MÉTHODE DES COURTIERS PERFORMANTS
1. POURQUOI LA QUALIFICATION EST CRITIQUE
Un agent non qualifié appelle 100 entreprises et perd du temps sur 70 d'entre elles. Un agent qualifié identifie rapidement les 30 qui ont un vrai potentiel et les travaille en profondeur. La qualification, c'est votre filtre de rentabilité.
2. LES 5 CRITÈRES DE QUALIFICATION (méthode BANTS adaptée)
B — BUDGET (capacité à signer)
→ Quelle est la taille de l'entreprise ? (CA, effectifs)
→ Score Elipro et Crédit Safe — une entreprise fragile financièrement ne signera pas.
A — AUTORITÉ (le bon décideur)
→ Est-ce que j'ai le bon interlocuteur ? Décideur, interlocuteur, signataire peuvent être 3 personnes différentes.
→ Ne jamais pitcher sans avoir le décideur.
N — NEED (besoin réel)
→ Y a-t-il un contrat à renégocier ?
→ La fenêtre de 2 ans est-elle ouverte ?
→ Le client est-il insatisfait de son fournisseur actuel ?
T — TIMING (urgence)
→ Quand expire le contrat ? Moins de 24 mois = chaud.
→ Le RGPD est-il valide ? Sans ACD, pas de données Enedis.
S — SITUATION (profil technique)
→ Quel segment ? Quelle CAR ?
→ Électricité seule ? Gaz aussi ? Multi-sites ?
3. LE SCORE DE PRIORITÉ PROSPECT
Chaud ( ) : contrat < 24 mois, décideur joignable, CAR significative, Elipro > 6
Tiède ( ) : contrat 24-36 mois, interlocuteur identifié, demande de comparatif
Froid ( ) : contrat > 36 mois, difficile à joindre, ou entreprise fragile
4. LA RÈGLE DES 2 MINUTES
En 2 minutes d'appel, vous devez savoir :
① Le nom du décideur
② La date d'échéance approximative
③ Le fournisseur actuel
Si vous n'avez pas ces 3 infos en 2 minutes, requalifiez à un autre moment.
5. LES SIGNAUX D'UN DOSSIER GAGNANT
✓ Dirigeant directement au téléphone dès le 1er appel
✓ Contrat expirant dans moins de 12 mois
✓ "On cherchait justement quelqu'un" ou "notre fournisseur ne nous rappelle jamais"
✓ Plusieurs sites à gérer (dossier multi-PDL = valeur multipliée)
✓ Secteur énergivore (hôtellerie, restauration, industrie, santé)`,

{id:7,titre:"Construire et entretenir sa base prospects",categorie:"Prospection",description:"Transformer chaque appel en actif durable pour construire un pipeline commercial solide et rentable.",
contenu:`CONSTRUIRE UN PIPELINE COMMERCIAL DURABLE
1. LA PHILOSOPHIE DU PIPELINE
Un courtier débutant pense à la vente du mois. Un courtier expert pense à son pipeline sur 24 mois. Chaque appel — même un "non" — doit enrichir votre base pour créer une valeur future.
2. LES 4 TYPES DE DOSSIERS DANS VOTRE BASE
ACTIFS (fenêtre ouverte maintenant) : à travailler en priorité absolue
À MÛRIR (12-24 mois avant l'échéance) : un contact mensuel suffit
LOINTAINS (> 24 mois) : un contact trimestriel
PERDUS : à recontacter 12-18 mois après la perte — les contrats changent, les décideurs aussi
3. LA RÈGLE DE LA DATE D'ÉCHÉANCE
Pour CHAQUE prospect contacté, l'objectif est d'obtenir la date d'échéance du contrat. Même si c'est 2030. Cette date vaut de l'or — c'est votre système d'alerte naturel.
Sans date d'échéance = prospect non qualifié = impossible à prioriser.
4. LE RYTHME DE RELANCE OPTIMAL
Dossier chaud (< 12 mois) : relance toutes les 2 semaines
Dossier tiède (12-24 mois) : relance mensuelle
Dossier lointain (> 24 mois) : relance trimestrielle + note dans le CRM
5. L'EMAIL DE RELANCE POST-APPEL
Toujours envoyer un email dans les 2h après un premier appel positif :
"Bonjour M. [Nom], comme convenu lors de notre échange, je me permets de vous envoyer une première synthèse sur l'évolution des tarifs énergie et les opportunités actuelles. [Votre nom] — Eureka Energy Consulting"
6. LE PIÈGE À ÉVITER : L'ACCUMULATION SANS QUALIFICATION
Avoir 2000 prospects non qualifiés dans sa base = zéro valeur.
Avoir 300 prospects qualifiés avec dates d'échéance = une mine d'or.
Qualité > quantité. Toujours.
7. LA MÉTHODE DES "3 O"
Chaque semaine, classez vos prospects en :
- Ouverts (dans la fenêtre, à appeler cette semaine)
- Observés (à surveiller, à rappeler dans 1-3 mois)
- Oubliés (à archiver ou à supprimer)`,

{id:8,titre:"Gérer les objections — Les 12 plus fréquentes",categorie:"Commercial",description:"Transformer chaque objection en opportunité de dialogue et ne plus jamais être pris au dépourvu.",
contenu:`LES 12 OBJECTIONS LES PLUS FRÉQUENTES ET LEURS RÉPONSES
PRINCIPE DE BASE : Une objection n'est pas un refus. C'est une demande d'information déguisée. Ne défendez jamais — questionnez et reformulez.
1. "ON A DÉJÀ UN FOURNISSEUR"
Réponse : "C'est exactement la situation de la plupart de nos clients avant qu'on les contacte. La question n'est pas de changer pour changer — c'est de savoir si votre contrat actuel est encore compétitif. Votre contrat expire quand ?"
2. "ON EST SATISFAIT"
Réponse : "C'est très bien. La satisfaction ne porte pas forcément sur le prix. Depuis les hausses de 2022-2023, même des clients satisfaits ont réalisé qu'ils payaient trop cher. En combien de temps peut-on comparer votre offre actuelle avec le marché ?"
3. "ENVOYEZ UN MAIL"
Réponse : "Je vais le faire, bien sûr. Mais pour que le comparatif soit pertinent, j'ai besoin de 2 informations : votre fournisseur actuel et votre date d'échéance. Vous les avez sous la main ?"
4. "C'EST PAS MOI QUI DÉCIDE"
Réponse : "Je comprends. C'est qui la personne qui gère ça ? Votre DG, votre comptable ?"
5. "PAS DE BUDGET"
Réponse : "Notre démarche ne vous coûte rien. On est rémunérés par les fournisseurs sur les contrats qu'on place. Pour vous, c'est un service gratuit de comparaison. Ça ne coûte rien de regarder ?"
6. "JE N'AI PAS LE TEMPS"
Réponse : "Je comprends, vous êtes occupé. Pour ne pas vous faire perdre de temps, j'ai besoin de 2 minutes maintenant pour qualifier votre situation, et si ça vaut la peine d'aller plus loin, on prend RDV quand vous voulez."
7. "ON A DÉJÀ UN COURTIER"
Réponse : "Ça ne pose aucun problème. Est-ce que vous pouvez me dire depuis quand vous travaillez ensemble ? Et est-ce que les offres qu'il vous a présentées étaient meilleures que votre contrat actuel ?"
8. "LES PRIX SONT TROP ÉLEVÉS"
Réponse : "C'est justement pour ça qu'on intervient. Notre rôle est de faire jouer la concurrence entre fournisseurs pour vous obtenir les meilleurs tarifs. Quel est votre tarif actuel en €/kWh ?"
9. "ON RENOUVELLE AUTOMATIQUEMENT"
Réponse : "Beaucoup d'entreprises font ça — et c'est souvent la moins bonne décision financièrement. La reconduction tacite se fait généralement aux tarifs du fournisseur, qui sont rarement les plus compétitifs. Quand est prévu votre renouvellement ?"
10. "J'AI UNE MAUVAISE EXPÉRIENCE AVEC UN COURTIER"
Réponse : "Je comprends et c'est légitime. Qu'est-ce qui s'est passé exactement ? [Écouter] Je comprends votre méfiance. Notre fonctionnement est différent : [expliquer votre valeur ajoutée spécifique]."
11. "ON VA RÉFLÉCHIR"
Réponse : "Bien sûr. Pour que vous puissiez réfléchir sur une base concrète, est-ce qu'on peut convenir d'un RDV dans 3 jours où je vous présente les offres que j'aurai comparées pour vous ?"
12. "C'EST TROP TÔT, ON A ENCORE 3 ANS"
Réponse : "C'est en fait le moment idéal. Les entreprises qui anticipent 2 ans à l'avance ont accès aux meilleurs prix à terme et sont protégées des variations de marché. En 10 minutes, je vous explique comment ça fonctionne — ça ne vous engage à rien."`,

{id:9,titre:"Les techniques de closing — Conclure sans forcer",categorie:"Commercial",description:"Les méthodes utilisées par les meilleurs vendeurs pour transformer un intérêt en signature sans jamais être perçu comme agressif.",
contenu:`LES TECHNIQUES DE CLOSING — L'ART DE CONCLURE
1. LE PRINCIPE DU CLOSING NATUREL
Le closing n'est pas un moment de pression. C'est la conclusion logique d'un processus bien conduit. Si vous avez bien qualifié, bien écouté et bien présenté, le closing est presque naturel.
2. LES SIGNAUX D'ACHAT — RECONNAÎTRE QUE LE CLIENT EST PRÊT
Verbaux :
• "C'est intéressant..."
• "Et dans ce cas, on ferait quoi pour le RGPD ?"
• "Combien de temps ça prendrait ?"
• "Et si on signe en janvier ?"
Non-verbaux (en RDV) :
• Se redresse sur sa chaise
• Prend des notes
• Relit le document
• Pose des questions sur les délais
3. LES TECHNIQUES DE CLOSING
LE CLOSING DE L'ALTERNATIVE :
"On peut démarrer la procédure maintenant ou vous préférez qu'on en parle à nouveau en [date] ?"
→ Jamais "oui ou non" — toujours deux options positives.
LE CLOSING DU SILENCE :
Après votre proposition finale, taisez-vous. Celui qui parle en premier a perdu. Attendez la réponse du prospect, aussi inconfortable que ce silence soit.
LE CLOSING DE L'URGENCE VRAIE :
"Les tarifs à terme que je vous présente aujourd'hui sont valables jusqu'à fin de semaine. Après, les marchés auront bougé et ces conditions ne seront peut-être plus disponibles." (À utiliser UNIQUEMENT si c'est vrai.)
LE CLOSING DE LA RÉCAPITULATION :
"Donc si je résume : vous avez une CAR de 30 MWh, votre contrat expire en juin, et le fournisseur que je vous propose vous fait économiser X€ sur 3 ans. Est-ce qu'il reste un point qui vous empêche d'avancer ?"
LE CLOSING DU DERNIER OBSTACLE :
"Si on règle ce point-là, vous êtes prêt à signer ?" — Identifie le dernier frein.
4. CE QU'IL NE FAUT JAMAIS FAIRE
Demander "alors, vous avez décidé ?" (trop vague)
Relancer immédiatement après un non
Promettre ce que vous ne pouvez pas tenir
Signer un client non qualifié financièrement
5. APRÈS LE CLOSING — LE PROCESSUS ADMINISTRATIF
① Confirmer verbalement : "Parfait, on est d'accord sur les conditions ?"
② Envoyer le contrat dans les 24h
③ Confirmer la réception par téléphone dans les 48h
④ Préparer la checklist : RGPD signé, facture reçue, PDL confirmé`,

{id:10,titre:"La négociation tarifaire — Maximiser la marge sans perdre le client",categorie:"Commercial",description:"Les techniques de négociation des meilleurs courtiers pour défendre leur marge tout en satisfaisant le client.",
contenu:`LA NÉGOCIATION TARIFAIRE — DÉFENDRE SA MARGE
1. COMPRENDRE CE QUE NÉGOCIE VRAIMENT LE CLIENT
La plupart des clients ne négocient pas vraiment le prix — ils cherchent la certitude d'avoir le meilleur deal. Votre rôle : leur donner cette certitude AVANT qu'ils demandent une remise.
2. LA RÈGLE DE NEVER GIVE, ALWAYS TRADE
Ne jamais céder sur la marge sans obtenir quelque chose en échange.
Mauvais : "D'accord, je baisse ma marge de 2€/MWh."
Bien : "Si vous signez sur 3 ans au lieu de 2, je peux aller chercher un meilleur tarif fournisseur qui vous revient moins cher au total."
3. LES LEVIERS DE NÉGOCIATION À VOTRE DISPOSITION
→ Durée du contrat : plus c'est long, plus le fournisseur peut faire un effort
→ Multi-sites : si le client a plusieurs PDL, vous pouvez obtenir un tarif de groupe
→ Timing : signer maintenant vs dans 6 mois peut faire varier le prix de 5-10%
→ Profil de consommation : une consommation stable (moins de pics) = meilleur tarif
4. L'ANCRAGE PAR LE HAUT
Toujours présenter une première offre légèrement supérieure à ce que vous visez. Cela crée de la marge pour négocier à la baisse tout en restant dans votre zone cible.
Exemple : vous visez 18€/MWh de marge → présentez à 22€/MWh. Si le client négocie à 19€, vous avez votre marge + il pense avoir eu une remise.
5. LA TECHNIQUE DE LA FOURCHETTE
Au lieu de donner un prix sec, donnez une fourchette :
"Selon les offres qu'on reçoit des fournisseurs, vous vous situeriez entre 15 et 20€/MWh de marge — ça dépend de la durée et du timing de signature."
Le client s'ancre mentalement sur le bas de la fourchette (15€) — ce qui vous laisse de la marge.
6. QUAND LE CLIENT DEMANDE UNE REMISE DIRECTE
Réponse type : "Je comprends votre demande. Voici ce que je peux faire : si vous confirmez votre signature d'ici vendredi, je relance les fournisseurs pour une offre de dernière minute. Ça m'arrive d'obtenir 1-2€ de mieux en jouant sur l'urgence. On tente ça ?"
7. LA LIMITE À NE JAMAIS FRANCHIR
Ne jamais négocier en dessous de votre marge minimum fixée par Eureka. Une vente à marge nulle n'est pas une vente — c'est un service gratuit qui vous coûte du temps.`,

{id:11,titre:"Lire et analyser une facture d'énergie",categorie:"Technique",description:"Savoir décrypter une facture électrique ou gazière pour extraire les données essentielles et identifier les opportunités d'économies.",
contenu:`DÉCRYPTER UNE FACTURE D'ÉNERGIE PROFESSIONNELLE
1. POURQUOI SAVOIR LIRE UNE FACTURE EST ESSENTIEL
La facture est votre outil de travail numéro 1. C'est elle qui contient le PDL, la CAR, le tarif actuel et la date d'échéance. Un courtier qui ne sait pas lire une facture est comme un médecin qui ne sait pas lire une radio.
2. LES INFORMATIONS À EXTRAIRE EN PRIORITÉ
Sur UNE facture électrique, cherchez :
① Le PDL (14 chiffres) — souvent libellé "Point de Livraison" ou "N° de compteur"
② La puissance souscrite (en kVA) — détermine le segment C1-C5
③ La consommation de la période (en kWh)
④ La CAR ou consommation annuelle estimée
⑤ Le tarif unitaire (€/kWh HT)
⑥ La date de début et fin du contrat
⑦ Le nom du fournisseur et le type d'offre
3. COMPRENDRE LES COMPOSANTES D'UNE FACTURE ÉLECTRIQUE
La facture électrique se compose de :
• Part énergie (fourniture) : le prix que vous négociez — c'est votre terrain de jeu
• TURPE (Tarif d'Utilisation des Réseaux Publics d'Électricité) : fixé par la CRE, non négociable
• Taxes (CSPE, CTA, TCFE) : fixes, non négociables
• TVA : 20% pour les professionnels
Attention : comparez TOUJOURS uniquement la part énergie HT. Les taxes sont identiques chez tous les fournisseurs.
4. LES PIÈGES COURANTS À IDENTIFIER
① Le tarif affiché inclut-il les taxes ? (comparez toujours HT)
② Y a-t-il une clause de révision de prix cachée dans les CGV ?
③ La puissance souscrite est-elle adaptée à la consommation réelle ? (sur-calibrage = surcoût inutile)
④ Y a-t-il des dépassements de puissance facturés ?
5. CALCULER LE POTENTIEL D'ÉCONOMIE
Si le client paie 0,18 €/kWh HT (part énergie) et que vous pouvez proposer 0,16 €/kWh :
→ Économie : 0,02 €/kWh
→ Avec une CAR de 50 MWh = 50 000 kWh
→ Économie annuelle : 50 000 × 0,02 = 1 000 € par an
→ Sur 3 ans : 3 000 € d'économie
C'est votre argument de vente béton.
6. LA FACTURE GAZ — SPÉCIFICITÉS
Pour le gaz, les unités peuvent être en m³ ou en kWh. La conversion : 1 m³ de gaz naturel ≈ 10 kWh (facteur de conversion variable selon le pouvoir calorifique).
La CAR gaz est en MWh/an ou en m³/an.`,

{id:12,titre:"Le processus de changement de fournisseur — De A à Z",categorie:"Technique",description:"Comprendre et expliquer au client chaque étape du processus de souscription pour rassurer et fluidifier la signature.",
contenu:`LE PROCESSUS DE CHANGEMENT DE FOURNISSEUR — ÉTAPE PAR ÉTAPE
1. POURQUOI CONNAÎTRE CE PROCESSUS EST CRUCIAL
Un client qui ne comprend pas le processus a peur. Un client qui comprend chaque étape signe avec confiance. Votre rôle : dédramatiser et fluidifier.
2. LES 7 ÉTAPES DU CHANGEMENT DE FOURNISSEUR
ÉTAPE 1 — COLLECTE DES DONNÉES (Vous)
• Récupérer la facture du client
• Identifier PDL, CAR, puissance souscrite, fournisseur actuel
• Faire signer l'autorisation RGPD/ACD pour accès aux données Enedis
ÉTAPE 2 — ANALYSE ET COMPARATIF (Vous + Partenaire Neogies)
• Transmission des données à Neogies
• Accès aux offres des fournisseurs partenaires
• Construction du comparatif tarifaire
ÉTAPE 3 — PRÉSENTATION DES OFFRES (Vous)
• Présenter 2-3 offres au client
• Expliquer les différences (prix fixe vs indexé, durée, options)
• Répondre aux objections
ÉTAPE 4 — SIGNATURE DU CONTRAT (Client)
• Le client signe le contrat avec le nouveau fournisseur
• Durée de rétractation légale : 14 jours pour les professionnels (selon les cas)
• Envoi de l'original au fournisseur
ÉTAPE 5 — RÉSILIATION DE L'ANCIEN CONTRAT (Fournisseur)
• Le nouveau fournisseur notifie l'ancien de la résiliation
• Délai de résiliation : généralement dans le respect des préavis contractuels
• Le client N'A RIEN À FAIRE — c'est géré automatiquement entre fournisseurs

contenu:`RGPD ET AUTORISATION DE COLLECTE DE DONNÉES (ACD) — GUIDE COMPLET
1. QU'EST-CE QUE LE RGPD DANS LE CONTEXTE ÉNERGIE ?
Le RGPD (Règlement Général sur la Protection des Données) impose que vous obteniez le consentement explicite du client avant de demander ses données de consommation à Enedis.
Dans notre métier, ce consentement prend la forme de l'ACD (Autorisation de Collecte de Données) — aussi appelée RGPD Enedis.
2. POURQUOI L'ACD EST INDISPENSABLE
Sans ACD signée, Enedis ne transmet pas les données de consommation au fournisseur. Sans données de consommation, pas d'offre possible. C'est simple : pas d'ACD = pas de dossier.
3. CE QUE CONTIENT L'ACD
Le document ACD autorise :
• Eureka Energy Consulting et/ou Neogies à accéder aux données Enedis
• L'accès à la CAR, à l'historique de consommation, aux index du compteur
• La durée de l'autorisation : 12 MOIS
4. LA DURÉE DE VALIDITÉ — POINT CRITIQUE
L'ACD est valide 12 mois à compter de la date de signature.
→ Passé ce délai, il faut en faire signer une nouvelle.
→ Le CRM vous alerte automatiquement avant l'expiration.
Conséquence pratique : si vous avez signé une ACD en janvier 2024, elle expire en janvier 2025. Si le dossier n'est pas conclu avant, vous devez en obtenir une nouvelle.
5. COMMENT FAIRE SIGNER L'ACD
La démarche :
① Expliquez au client que c'est obligatoire pour accéder aux offres des fournisseurs
② Rassurez : "Ce document n'engage pas votre entreprise à changer de fournisseur"
③ Envoyez le document par email ou présentez-le en version papier
④ Récupérez l'original signé
Script : "Pour qu'on puisse vous faire une offre personnalisée, j'ai besoin que vous signiez ce document d'autorisation — c'est obligatoire pour qu'Enedis nous transmette vos données de consommation. Ça ne vous engage à rien, c'est juste pour qu'on accède à vos chiffres."
6. LES OBLIGATIONS DU COURTIER (RGPD général)
• Vous ne pouvez pas utiliser les données du prospect à d'autres fins que la mission de courtage
• Vous devez informer le prospect de la finalité de la collecte
• Les données doivent être conservées de manière sécurisée (CRM protégé par mot de passe)
• En cas de demande, le prospect peut demander la suppression de ses données
7. LES SANCTIONS EN CAS DE NON-CONFORMITÉ
La CNIL peut infliger des amendes pouvant aller jusqu'à 4% du CA annuel mondial ou 20 millions d'euros (selon le plus élevé). Dans la pratique, les risques sont surtout liés à la réputation et à la perte de confiance du client.`,

contenu:`SCRIPTS ADAPTÉS PAR SECTEUR D'ACTIVITÉ

{id:15,titre:"La relance et le suivi client — Ne jamais lâcher sans raison",categorie:"Scripts d'appel",description:"Maîtriser les techniques de relance pour transformer les prospects tièdes en clients sans jamais être perçu comme insistant.",
contenu:`LA RELANCE — L'ART DE RESTER EN TÊTE SANS AGACER
1. LE PARADOXE DE LA RELANCE
Les études montrent que 80% des ventes se font entre le 5ème et le 12ème contact. La majorité des commerciaux abandonnent après le 2ème. La relance est votre avantage concurrentiel le plus sous-estimé.
2. LA RÈGLE DES RELANCES ESPACÉES
Appel 1 : Premier contact — qualifier
Appel 2 (J+2) : "Comme convenu, je vous rappelle pour..."
Email J+3 : Info marché + rappel de votre proposition
Appel 3 (J+7) : "J'ai une info sur les tarifs qui vous concerne..."
Email J+15 : Article ou info marché pertinente
Appel 4 (J+30) : "Le marché a bougé depuis notre dernier échange..."
→ Puis contact mensuel jusqu'à la fenêtre de négociation
3. LES SCRIPTS DE RELANCE
RELANCE J+2 (post 1er contact positif) :
"Bonjour M. [Nom], c'est [Prénom] d'Eureka Energy. On avait échangé mardi sur vos contrats énergie. J'ai eu le temps d'analyser votre profil et j'ai des éléments intéressants à vous partager. Vous avez 5 minutes ?"
RELANCE APRÈS SILENCE (client qui ne rappelle pas) :
"Bonjour M. [Nom], je ne veux pas vous embêter — je sais que vous êtes occupé. Je vous fais juste un signe car le marché a bougé depuis notre dernier échange et je voulais vous tenir informé. Je reste disponible quand vous voulez."
RELANCE APRÈS UN "ON VA RÉFLÉCHIR" :
"Bonjour, c'est [Prénom]. Il y a 15 jours, vous m'aviez dit que vous alliez réfléchir. Je ne veux pas vous mettre la pression — j'aimerais juste savoir si vous avez eu le temps d'y penser et si vous avez des questions. Ça prend 2 minutes."
RELANCE DOSSIER LOINTAIN (contact trimestriel) :
"Bonjour M. [Nom], je reviens vers vous car votre contrat énergie approche de sa fenêtre de renégociation [dans X mois]. Je voulais faire un point avec vous sur les évolutions du marché depuis notre dernier contact. Toujours chez [fournisseur actuel] ?"
4. L'EMAIL DE VALEUR AJOUTÉE
Ne relancez jamais à vide. Chaque relance doit apporter de la valeur :
• Un point marché récent ("les prix ont baissé de X% ce mois")
• Une info réglementaire ("nouvelle aide CEE pour les entreprises")
• Un exemple client anonymisé ("un client de votre secteur a économisé X€")
5. SAVOIR QUAND ARRÊTER
Après 8-10 contacts sans réponse, envoyez un "email de rupture" :
"Bonjour M. [Nom], je n'ai pas réussi à vous joindre ces dernières semaines. Je comprends que ce n'est peut-être pas le bon moment. Je cesse mes relances pour ne pas vous importuner — mais si vous souhaitez un jour comparer vos offres énergie, je reste disponible. Bonne continuation."
Ce mail déclenche souvent... une réponse.`,

const refreshFromSupabase=useCallback(async function refreshFromSupabase(){
  if(!window.db.ready) return;
  try{
    const [prosData,agData,usData,objData,rdvRefresh]=await Promise.all([
      window.db.select('prospects',{order:'id'}),
      window.db.select('agents',{order:'id'}),
      window.db.rpc('list_users_safe'),
      window.db.select('objectifs',{order:'agent_id'}),
      window.db.select('rappels',{order:'date'}).catch(()=>null),
    ]);
    if(prosData!==null) setProspects((prosData).map(supaToProsp));
    if(agData!==null) setAgents((agData).map(supaToAgent));
    if(usData!==null){
      const mdpCache=JSON.parse(localStorage.getItem('eureka_mdp_cache')||'{}');
      setUsers((usData).map(supaToUser).map(u=>mdpCache[u.id]?{...u,mdp:mdpCache[u.id]}:u));
    }
    if(objData!==null&&objData.length>0){const o={};objData.forEach(x=>{o[x.agent_id]=x.valeur;});setObjectifs(o);}
    if(rdvRefresh!==null&&rdvRefresh.length>=0){setRappelsPreclos(rdvRefresh.map(r=>({id:r.id,date:r.date||"",heure:r.heure||"08:00",type:r.type||"préclos",numero:r.numero||"",mail:r.mail||"",note:r.note||"",entreprise:r.entreprise||"",createdBy:r.created_by||""})));}
    setSupaLastSync(new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}));
    setSupaStatus('ok');
  }catch(e){ setSupaStatus('error'); }
},[]);
// ─── supaWrite — wrapper Supabase avec feedback erreur visible ──────────
// Remplace les .catch(()=>{}) silencieux — affiche une notification en cas d'échec
async function supaWrite(promise, description){
  try{
    const result = await promise;
    if(result===false||result===null){
      console.warn('[CRM] Supabase retourne false/null pour:',description);
      setSupaErrMsg("Erreur d'enregistrement : "+description+". L'opération n'a pas été confirmée par le serveur.");
      return null;
    }
    setSupaErrMsg(null);
    return result;
  }catch(e){
    console.error('[CRM] Erreur Supabase:',description,e);
    setSupaErrMsg("Erreur serveur : "+description+" — "+e.message);
    return null;
  }
}

// ─── Calibrage — synchroniser tous les sélecteurs de période ─────────────
// Quand une plage est active : naviguer vers la FIN de la période (calibFin)
// pour afficher les données les plus récentes de la plage.
// Si seulement calibDebut est défini (sans fin), naviguer vers le mois courant.
// À l'annulation, retour au mois/année en cours.
useEffect(()=>{
  if(calibDebut||calibFin){
    // Référence = fin de plage si définie, sinon mois courant (la plage est ouverte vers l'avenir)
    const ref=calibFin||null;
    let y,m;
    if(ref){
      const parts=ref.split("-");
      y=parseInt(parts[0])||new Date().getFullYear();
      m=parseInt(parts[1])||new Date().getMonth()+1;
    } else {
      const n=new Date();
      y=n.getFullYear();
      m=n.getMonth()+1;
    }
    const newMois=`${y}-${String(m).padStart(2,"0")}`;
    setMoisCa(newMois);
    setAnneeCa(y);
    setMoisClass(newMois);
    setAnneeClass(y);
  } else {
    // Annulation calibrage → retour mois/année courant
    const n=new Date();
    const tm=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}`;
    setMoisCa(tm);
    setAnneeCa(n.getFullYear());
    setMoisClass(tm);
    setAnneeClass(n.getFullYear());
  }
},[calibDebut,calibFin]);

async function fetchOneFeed(feed){
  // Proxy 1 : rss2json
  try{
    const r=await fetch('https://api.rss2json.com/v1/api.json?count=5&rss_url='+encodeURIComponent(feed.url),{signal:AbortSignal.timeout(10000)});
    const d=await r.json();
    if(d.items&&d.items.length>0) return d.items.map(it=>({...it,src:feed.src}));
  }catch(e){}
  // Proxy 2 : allorigins
  try{
    const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(feed.url),{signal:AbortSignal.timeout(10000)});
    const text=await r.text();
    const raw=JSON.parse(text).contents||'';
    const items=[];
    const matches=[...raw.matchAll(/<item[^>]*>([\s\S]*?)<\/item>/gi)];
    for(const m of matches){
      const t=(m[1].match(/<title[^>]*>(?:<!\[CDATA\[)?(.*?)(?:\]\]>)?<\/title>/i)||[])[1]||'';
      const d=(m[1].match(/<description[^>]*>(?:<!\[CDATA\[)?([\s\S]*?)(?:\]\]>)?<\/description>/i)||[])[1]||'';
      const l=(m[1].match(/<link[^>]*>(.*?)<\/link>/i)||[])[1]||'';
      const pub=(m[1].match(/<pubDate[^>]*>(.*?)<\/pubDate>/i)||[])[1]||'';
      const titre=t.replace(/<[^>]+>/g,'').replace(/&[a-z#0-9]+;/g,' ').trim();
      const desc=d.replace(/<[^>]+>/g,'').replace(/&[a-z#0-9]+;/g,' ').trim().substring(0,220);
      if(titre) items.push({title:titre,description:desc,link:l.trim(),pubDate:pub,src:feed.src});
    }
    if(items.length>0) return items;
  }catch(e){}
  return [];
}

      tendance:nRisque>ptsUniq.length/2?'hausse':'stable',

    raisonPerte:"Raison de perte",notes:"Notes",notesInternes:"Notes internes"};
  const ancien=prospects.find(p=>p.id===form.id)||{};
  const nouvEntrees=Object.entries(CHAMPS_SUIVIS)
    .filter(([k])=>String(form[k]||"")!==String(ancien[k]||""))
    .map(([k,label])=>({ts:tsNow(),user:`${user.prenom} ${user.nom}`,champ:label,avant:String(ancien[k]||"—"),apres:String(form[k]||"—")}));
  const historiqPrev=Array.isArray(form.modifHistory)?form.modifHistory:[];
  saved={...form,modifHistory:[...nouvEntrees,...historiqPrev].slice(0,50)};
  setProspects(ps=>ps.map(p=>p.id===form.id?saved:p));
  setProsp(saved);
  log("Dossier modifié",form.societe);
  if(window.db.ready) window.db.upsert('prospects',[prospToSupa(saved)]).catch(e=>setSupaErrMsg("Erreur Supabase: "+e.message));
  setModeForm(null);setEditMode(false);setVue("fiche");
}else{
  // ─ Vérification anti-doublons SIRET en temps réel dans Supabase ─
  if(window.db.ready&&form.siret&&form.siret.length===14){
    const existing=await window.db.select('prospects',{filter:`siret=eq.${form.siret.replace(/\s/g,"")}`,order:'id'});
    if(existing&&existing.length>0){
      const dup=supaToProsp(existing[0]);
      const agDup=agents.find(a=>a.id===dup.agentId);
      setDoublonMsg(`⚠ SIRET déjà enregistré — "${dup.societe}" existe déjà dans la base${agDup?`, attribué à ${agDup.nom}`:""}. Vérifiez avant de continuer.`);
      return;
    }
  }
  // Vérification locale (doublon par nom si pas de SIRET)
  if(checkDoublon()) return;
  saved={...form,id:Date.now(),appelHistory:[]};
  setProspects(ps=>[...ps,saved]);
  log("Prospect créé",form.societe);
  if(window.db.ready) window.db.upsert('prospects',[prospToSupa(saved)]).catch(e=>setSupaErrMsg("Erreur Supabase: "+e.message));
  setModeForm(null);setEditMode(false);setVue("prospects");
}
}

// lookupSiret : remplit automatiquement les infos société via l'API data.gouv.fr
async function lookupSiret(siret,force){
  const clean=siret.replace(/\s/g,"");
  if(!clean||clean.length!==14)return;
  setSiretLookup("loading");
  try{
    // Essai 1 : recherche exacte par SIRET (14 chiffres)
    const res=await fetch(`https://recherche-entreprises.api.gouv.fr/search?q=${clean}&page=1&per_page=1`);
    if(!res.ok){setSiretLookup("error");return;}
    const data=await res.json();
    if(data.results&&data.results.length>0){
      const e=data.results[0];
      const s=e.siege||{};
      // Capitalisation propre
      const cap=str=>(str||"").split(" ").map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(" ");
      const nomSociete=e.nom_complet||e.nom_raison_sociale||"";
      const adresse=s.adresse||s.geo_adresse||"";
      const naf=e.activite_principale||s.activite_principale||"";
      // Décideur : premier dirigeant de la liste
      const dirigeants=e.dirigeants||[];
      const dir0=dirigeants[0]||null;
      const nomDir=dir0?cap(`${dir0.prenoms||dir0.prenom||""} ${dir0.nom||""}`.trim()):"";
      // Remplir TOUS les champs — toujours écraser (l'utilisateur vient de saisir un nouveau SIRET)
      setForm(f=>({
        ...f,
        societe: nomSociete ? cap(nomSociete) : f.societe,
        naf:     naf        ? naf.toUpperCase()     : f.naf,
        adresseRue: adresse ? cap(adresse)           : f.adresseRue,
        cp:      s.code_postal||f.cp,
        ville:   s.libelle_commune ? cap(s.libelle_commune) : f.ville,
        decideur: nomDir || f.decideur,
      }));
      setSiretLookup("found");
    }else{
      setSiretLookup("notfound");
    }
  }catch(err){
    console.warn('[SIRET lookup]',err);
    setSiretLookup("error");
  }
}

    const ag=agents.find(a=>a.id===p.agentId);
    const v=calcValeur(p.car_elec,p.duree_elec,p.marge_elec,p.car_gaz,p.duree_gaz,p.marge_gaz);
    const fourn=v?.fourn||0;
    const eureka=v?.eureka||0;
    const vC=parseFloat(p.valeur_car)||0,vD=parseFloat(p.valeur_duree)||0,vM=parseFloat(p.valeur_marge)||0;
    const valDos=Math.round((vC*vD*vM)/12);
    return [p.id||"",p.societe||"",p.dateSig||"",ag?.nom||"",
      Math.round(v?.fournE||0),Math.round(v?.fournG||0),Math.round(fourn),Math.round(eureka),valDos,p.statut||""];
  });
  const wsVal=XLSX.utils.aoa_to_sheet([hVal,...rowsVal]);
  wsVal["!cols"]=[{wch:10},{wch:28},{wch:14},{wch:20},{wch:18},{wch:18},{wch:18},{wch:16},{wch:16},{wch:12}];
  XLSX.utils.book_append_sheet(wb,wsVal,"💰 VALEURS");
  // ── Téléchargement ───────────────────────────────────────────────────────
  const now=new Date();
  const dateStr=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,"0")}${String(now.getDate()).padStart(2,"0")}`;
  XLSX.writeFile(wb,`EurekaCRM_Export_${dateStr}.xlsx`);
  log("Export Excel","Export complet — "+prospects.length+" dossiers, "+agents.length+" agents");
}
// ─── Fonction IMPORT ─────────────────────────────────────────────────────
function importerExcel(fichier){
  if(typeof XLSX==="undefined"){alert("SheetJS non chargé.");return;}
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const wb=XLSX.read(ev.target.result,{type:"binary"});
      let nbDos=0,nbAg=0,nbJou=0;
      // ── Import DOSSIERS ────────────────────────────────────────────────
      const shDos=wb.Sheets["DOSSIERS"]||wb.Sheets["DOSSIERS"];
      if(shDos){
        const rows=XLSX.utils.sheet_to_json(shDos,{defval:""});
        const newProspects=rows.map(r=>({
          id:String(r["ID"]||"p_"+Date.now()+"_"+Math.random()),
          societe:String(r["SOCIÉTÉ"]||r["SOCIETE"]||""),
          siret:String(r["SIRET"]||""),
          decideur:String(r["DÉCIDEUR"]||r["DECIDEUR"]||""),
          ville:String(r["VILLE"]||""),
          email:String(r["EMAIL"]||""),
          tel:String(r["TÉLÉPHONE"]||r["TELEPHONE"]||""),
          commentaire:String(r["COMMENTAIRE"]||""),
          statut:String(r["STATUT"]||"Prospect"),
          type:String(r["TYPE"]||""),
          agentId:String(r["AGENT ID"]||""),
          datePro:String(r["DATE PROSPECT."]||""),
          dateSig:String(r["DATE SIGNATURE"]||""),
          dateEch:String(r["DATE ÉCHÉANCE"]||r["DATE ECHEANCE"]||""),
          dateEch_elec:String(r["DATE ÉCH. ÉLEC"]||r["DATE ECH. ELEC"]||""),
          dateEch_gaz:String(r["DATE ÉCH. GAZ"]||r["DATE ECH. GAZ"]||""),
          dateRgpd:String(r["DATE RGPD"]||""),
          dateRappelPerte:String(r["DATE RAPPEL PERTE"]||""),
          car_elec:r["CAR ÉLEC (MWh)"]||r["CAR ELEC (MWh)"]||"",
          duree_elec:r["DURÉE ÉLEC (an)"]||r["DUREE ELEC (an)"]||"",
          marge_elec:r["MARGE ÉLEC €/MWh"]||r["MARGE ELEC €/MWh"]||"",
          nbPdl:r["NB PDL"]||"",
          dateFacture:String(r["DATE FACTURE"]||""),
          dateRappelClient:String(r["DATE RAPPEL CLIENT"]||""),
          car_gaz:r["CAR GAZ (MWh)"]||"",
          duree_gaz:r["DURÉE GAZ (an)"]||r["DUREE GAZ (an)"]||"",
          marge_gaz:r["MARGE GAZ €/MWh"]||"",
          nbPce:r["NB PCE"]||"",
          valeur_car:r["VALEUR CAR"]||"",
          valeur_duree:r["VALEUR DURÉE"]||r["VALEUR DUREE"]||"",
          valeur_marge:r["VALEUR MARGE"]||"",
          appelHistory:[],
        })).filter(p=>p.societe.trim()!=="");
        if(newProspects.length>0){setProspects(newProspects);nbDos=newProspects.length;if(window.db.ready)window.db.upsert('prospects',newProspects.map(prospToSupa)).catch(e=>setSupaErrMsg("Erreur Supabase import prospects: "+e.message));}
      }
      // ── Import AGENTS ──────────────────────────────────────────────────
      const shAg=wb.Sheets["AGENTS"]||wb.Sheets["AGENTS"];
      if(shAg){
        const rows=XLSX.utils.sheet_to_json(shAg,{defval:""});
        const newAgents=rows.map(r=>({
          id:String(r["ID AGENT"]||"ag_"+Date.now()),
          nom:String(r["NOM COMPLET"]||""),
          dateDebut:String(r["DATE DÉBUT"]||r["DATE DEBUT"]||""),
          actif:String(r["ACTIF"]||"oui").toLowerCase()!=="non",
          photo:String(r["PHOTO URL"]||""),
        })).filter(a=>a.nom.trim()!=="");
        if(newAgents.length>0){
          setAgents(newAgents);
          if(window.db.ready)window.db.upsert('agents',newAgents.map(agentToSupa)).catch(e=>setSupaErrMsg("Erreur Supabase import agents: "+e.message));
          // Objectifs
          const newObj={};
          rows.forEach(r=>{
            const id=String(r["ID AGENT"]||"");
            const obj=parseFloat(r["OBJECTIF MENSUEL (€)"]||r["OBJECTIF MENSUEL (E)"]||0);
            if(id&&obj) newObj[id]=obj;
          });
          if(Object.keys(newObj).length>0){
            setObjectifs(o=>({...o,...newObj}));
            if(window.db.ready){const objRows=Object.entries(newObj).map(([agent_id,valeur])=>({agent_id,valeur}));window.db.upsert('objectifs',objRows).catch(e=>setSupaErrMsg("Erreur Supabase import objectifs: "+e.message));}
          }
          nbAg=newAgents.length;
        }
      }
      // ── Import JOURNAL ─────────────────────────────────────────────────
      const shJou=wb.Sheets["📓 JOURNAL"]||wb.Sheets["JOURNAL"];
      if(shJou){
        const rows=XLSX.utils.sheet_to_json(shJou,{defval:""});
        const newJou=rows.map(r=>({
          ts:String(r["DATE & HEURE"]||""),
          user:String(r["UTILISATEUR"]||""),
          action:String(r["ACTION"]||""),
          detail:String(r["DÉTAIL"]||r["DETAIL"]||""),
        })).filter(e=>e.action.trim()!=="");
        if(newJou.length>0){setJournal(newJou);nbJou=newJou.length;if(window.db.ready)window.db.upsert('journal',newJou.map(journalToSupa)).catch(e=>setSupaErrMsg("Erreur Supabase import journal: "+e.message));}
      }
      const msg=`Import terminé :\n• ${nbDos} dossier${nbDos>1?"s":""} importé${nbDos>1?"s":""}\n• ${nbAg} agent${nbAg>1?"s":""} importé${nbAg>1?"s":""}\n• ${nbJou} entrée${nbJou>1?"s":""} journal importée${nbJou>1?"s":""}`;
      alert(msg);
      log("Import Excel",`${nbDos} dossiers, ${nbAg} agents`);
    }catch(err){
      alert("Erreur lors de l'import : "+err.message+"\n\nVérifiez que le fichier est bien un export EurekaCRM.");
    }
  };
  reader.readAsBinaryString(fichier);
}
